name: Teesra Daily Pipeline

on:
  workflow_dispatch:  # manual trigger from GitHub UI
  schedule:
    - cron: '30 18 * * *'   # Job 1: 6:30 PM UTC = midnight IST (fetch & analyze)
    - cron: '30 1 * * *'    # Job 2: 1:30 AM UTC = 7:00 AM IST (send newsletter)

jobs:

  # ── JOB 1: Fetch & Analyze — runs at midnight IST ─────────────
  pipeline:
    name: Fetch & Analyze Articles
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 18 * * *'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FEED_API_KEY: ${{ secrets.FEED_API_KEY }}
          CRICAPI_KEY: ${{ secrets.CRICAPI_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python run_daily.py pipeline

  # ── JOB 2: Send Newsletter — runs at 7 AM IST ─────────────────
  newsletter:
    name: Send Newsletter
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 1 * * *'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FEED_API_KEY: ${{ secrets.FEED_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python run_daily.py newsletter

  # ── JOB 3: Manual Full Run — workflow_dispatch only ───────────
  manual-full:
    name: Manual Full Run (Pipeline + Newsletter)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FEED_API_KEY: ${{ secrets.FEED_API_KEY }}
          CRICAPI_KEY: ${{ secrets.CRICAPI_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python run_daily.py full
