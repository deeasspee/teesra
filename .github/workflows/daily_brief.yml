name: Teesra Daily Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'  # 2:30 AM UTC = 8:00 AM IST

jobs:
  daily_pipeline:
    name: Daily Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show time
        run: |
          echo "UTC: $(date -u)"
          echo "IST: $(TZ='Asia/Kolkata' date)"

      - name: Fetch and analyze articles
        id: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FEED_API_KEY: ${{ secrets.FEED_API_KEY }}
          CRICAPI_KEY: ${{ secrets.CRICAPI_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          echo "=== PIPELINE START ==="
          python run_daily.py pipeline
          echo "=== PIPELINE END ==="

      - name: Send newsletter
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FEED_API_KEY: ${{ secrets.FEED_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          echo "=== NEWSLETTER START ==="
          python run_daily.py newsletter
          echo "=== NEWSLETTER END ==="
