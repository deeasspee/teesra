name: Keep Workflows Alive

on:
  schedule:
    - cron: '0 12 * * 3'  # Every Wednesday noon UTC
  workflow_dispatch:

jobs:
  keep_alive:
    name: Prevent workflow auto-disable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep alive ping
        run: |
          echo "Keeping Teesra workflows active"
          echo "UTC: $(date -u)"
          echo "IST: $(TZ='Asia/Kolkata' date)"
